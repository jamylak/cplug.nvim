name: tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake curl tar

      - name: Install Neovim
        run: |
          curl -fsSL -o /tmp/nvim-linux-x86_64.tar.gz \
            https://github.com/neovim/neovim/releases/download/v0.11.3/nvim-linux-x86_64.tar.gz
          sudo rm -rf /opt/nvim-linux-x86_64
          sudo tar -C /opt -xzf /tmp/nvim-linux-x86_64.tar.gz
          echo "/opt/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Run test suite
        run: make test
